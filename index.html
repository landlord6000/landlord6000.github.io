<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Отчёты о пеших походах и поездках.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://landlord6000.github.io/">
  <link rel="icon" href="https://landlord6000.github.io/favicon.png?v=2" type="image/png" sizes="32x32">
  <link rel="shortcut icon" href="https://landlord6000.github.io/favicon.ico?v=2" type="image/x-icon">
  <link rel="apple-touch-icon" href="https://landlord6000.github.io/favicon.png?v=2" sizes="180x180">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #E9EDE3;
      --bg-card: #F5F4EC;
      --text: #20241C;
      --muted: #6E7566;
      --accent: #35606B;
      --accent2: #6B7D4F;
      --line: rgba(53, 96, 107, 0.18);
      --max-w: 640px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 96px 24px 64px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-optical-sizing: auto;
      font-size: clamp(2rem, 6vw, 2.7rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin: 0 0 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 56px;
    }

    .travell {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .travell li+li {
      border-top: 1px solid var(--line);
    }

    .travell a {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      text-decoration: none;
      color: var(--text);
      padding: 22px 4px;
      transition: padding-left 0.15s ease, color 0.15s ease;
    }

    .travell a:hover {
      padding-left: 10px;
      color: var(--accent);
    }

    .report-title {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.25rem;
    }

    .report-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    footer {
      margin-top: auto;
      padding-top: 56px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
    }

    footer a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Отчёты о походах и поездках</h1>

    <ul class="travell">
      <li>
        <a href="travell/moskvoretsky-2026/moskvoretsky-2026.html">
          <span class="report-title">Москворецкий пойменный заказник</span>
          <span class="report-meta">ПВД · 07.2026</span>
        </a>
      </li>
      <li>
        <a href="travell/karelia-2023/karelia-2023.html">
          <span class="report-title">Путешествие по югу Карелии</span>
          <span class="report-meta">Поход · 08.2023</span>
        </a>
      </li>
      <li>
        <a href="travell/karelia-2023/karelia-2023.html">
          <span class="report-title">Большая Валдайсая тропа на лыжах</span>
          <span class="report-meta">Лыжный поход · 01.2023</span>
        </a>
      </li>
    </ul>

    <footer>
      <a href="dnd/">Подвальчик DnD →</a>
    </footer>
  </div>
</body>

</html>
